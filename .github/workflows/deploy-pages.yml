name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static files
        run: |
          ASSET_VERSION="${GITHUB_SHA::7}"
          mkdir -p _site
          cp -R assets _site/assets
          cp index.html _site/
          cp app.js styles.css _site/
          perl -0pi -e "s#\\./styles\\.css(?:\\?v=[^\"]*)?#./styles.css?v=${ASSET_VERSION}#g; s#\\./app\\.js(?:\\?v=[^\"]*)?#./app.js?v=${ASSET_VERSION}#g" _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
